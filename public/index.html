<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ideukgae — 스트리머 후원 플랫폼</title>
  <meta name="robots" content="noindex" />
  <!-- 임시 랜딩: 본 홈은 DESIGN v2(신규 디자인)와 함께 교체 예정 -->
  <link rel="stylesheet" href="/assets/site.css" />
  <style>
    .tmp-hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; padding: 24px; }
    .tmp-hero h1 { font-size: clamp(2rem, 6vw, 3.5rem); }
    .tmp-hero p { color: var(--muted, #7d8aa0); max-width: 460px; line-height: 1.6; }
    .tmp-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .tmp-actions a { padding: 12px 22px; border-radius: 8px; text-decoration: none; font-weight: 700; }
    .tmp-primary { background: var(--blue, #0f6bff); color: #fff; }
    .tmp-secondary { border: 1px solid var(--border, #2b3548); color: inherit; }
  </style>
</head>
<body>
  <main class="tmp-hero">
    <h1>스트리머 후원 플랫폼</h1>
    <p>계좌이체 수수료 0%로 시작하는 후원 페이지.<br />지금 준비 중입니다 — 채널을 먼저 둘러보세요.</p>
    <div class="tmp-actions">
      <a class="tmp-primary" href="/channels">채널 탐색</a>
      <a class="tmp-secondary" href="/signup?role=streamer">스트리머로 시작</a>
      <a class="tmp-secondary" href="/login">로그인</a>
    </div>
  </main>
</body>
</html>
