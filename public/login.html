<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="계이득 계정으로 로그인하고 후원 페이지와 스튜디오를 이용하세요." />
    <title>로그인 - 계이득</title>
    <link rel="stylesheet" href="/assets/v2.css" />
    <link rel="icon" type="image/png" href="/assets/gyeideuk-logo.png" />
    <script src="/assets/theme.js"></script>
    <link rel="stylesheet" href="/assets/web-auth.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/assets/web-common.js"></script>
    <script defer src="/assets/web-auth.js"></script>
  </head>
  <body class="auth-page" data-auth-page="login">
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="/" aria-label="계이득 홈"><img src="/assets/gyeideuk-logo.png" alt="계이득" /></a>
        <nav class="site-nav">
          <a href="/channels">채널 탐색</a>
          <a href="/signup">가입하기</a>
          <button class="theme-toggle" type="button" aria-label="테마 전환"><svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg><svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
        </nav>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="login-title">
        <div class="auth-heading">
          <p class="eyebrow">Login</p>
          <h1 id="login-title">로그인</h1>
          <p class="auth-lead">스트리머는 스튜디오로, 시청자는 내 페이지로 이동합니다.</p>
        </div>

        <form id="login-form" class="auth-form" novalidate>
          <label>
            이메일
            <input id="login-email" type="email" autocomplete="email" required />
          </label>
          <label>
            비밀번호
            <input id="login-password" type="password" autocomplete="current-password" required minlength="6" />
          </label>
          <div class="auth-actions">
            <button id="login-submit" class="button primary" type="submit">로그인</button>
          </div>
          <p id="login-message" class="form-message" aria-live="polite"></p>
        </form>

        <!-- 재설정 메일에서 돌아온 복구 세션(type=recovery)일 때만 노출 — web-auth.js가 전환 -->
        <form id="recovery-form" class="auth-form is-hidden" novalidate>
          <p class="auth-substep-note">메일 인증이 확인되었어요. 새 비밀번호를 설정해 주세요.</p>
          <label>
            새 비밀번호
            <input id="recovery-password" type="password" autocomplete="new-password" required minlength="6" />
          </label>
          <label>
            새 비밀번호 확인
            <input id="recovery-password-confirm" type="password" autocomplete="new-password" required minlength="6" />
          </label>
          <div class="auth-actions">
            <button id="recovery-submit" class="button primary" type="submit">비밀번호 변경</button>
          </div>
          <p id="recovery-message" class="form-message" aria-live="polite"></p>
        </form>

        <p class="auth-alt">
          <button id="reset-toggle" class="link-button" type="button" aria-expanded="false" aria-controls="reset-form">비밀번호 재설정</button>
          <span aria-hidden="true">·</span>
          <a href="/signup">회원가입</a>
        </p>

        <form id="reset-form" class="auth-form reset-form is-hidden" novalidate>
          <p class="auth-substep-note">가입한 이메일로 비밀번호 재설정 링크를 보내 드려요.</p>
          <label>
            이메일
            <input id="reset-email" type="email" autocomplete="email" required />
          </label>
          <div class="auth-actions">
            <button id="reset-submit" class="button primary" type="submit">재설정 메일 보내기</button>
          </div>
          <p id="reset-message" class="form-message" aria-live="polite"></p>
        </form>

        <div class="social-block" aria-label="간편 로그인">
          <p class="social-title">간편 로그인</p>
          <div class="social-row">
            <button class="social-button" type="button" disabled aria-disabled="true">구글로 로그인 <span class="soon-badge">준비 중</span></button>
            <button class="social-button" type="button" disabled aria-disabled="true">카카오로 로그인 <span class="soon-badge">준비 중</span></button>
            <button class="social-button" type="button" disabled aria-disabled="true">네이버로 로그인 <span class="soon-badge">준비 중</span></button>
          </div>
        </div>
      </section>
    </main>

    <footer class="auth-footer">
      <a href="/privacy.html">개인정보처리방침</a>
      <a href="/terms.html">이용약관</a>
    </footer>
  </body>
</html>
