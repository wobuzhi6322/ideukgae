<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="계이득에서 후원할 수 있는 스트리머 채널을 찾아보세요. 시그니처 메뉴판이 있는 채널을 한눈에 볼 수 있습니다." />
    <title>채널 탐색 - 계이득</title>
    <link rel="stylesheet" href="/assets/v2.css" />
    <link rel="icon" type="image/png" href="/assets/gyeideuk-logo.png" />
    <script src="/assets/theme.js"></script>
    <link rel="stylesheet" href="/assets/web-channels.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/assets/web-common.js"></script>
    <script defer src="/assets/web-channels.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="/" aria-label="계이득 홈">
          <img src="/assets/gyeideuk-logo.png" alt="계이득" />
        </a>
        <nav class="site-nav" aria-label="주요 메뉴">
          <a href="/channels" aria-current="page">채널 탐색</a>
          <a href="/me">내 페이지</a>
          <a id="account-button" class="header-account" href="/login?next=%2Fchannels">로그인</a>
          <button class="theme-toggle" type="button" aria-label="테마 전환"><svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg><svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
        </nav>
      </div>
    </header>

    <main class="ch-main">
      <section class="ch-hero">
        <p class="eyebrow">Channels</p>
        <h1>채널 탐색</h1>
        <p class="ch-lead">시그니처 메뉴판이 준비된 채널을 둘러보고, 마음에 드는 스트리머를 바로 후원해 보세요.</p>
      </section>

      <div class="ch-toolbar">
        <label class="ch-search" for="channel-search">
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="channel-search" type="search" placeholder="채널명 또는 핸들 검색" autocomplete="off" maxlength="50" />
        </label>
      </div>

      <section id="channel-grid" class="ch-grid" aria-live="polite" aria-label="채널 목록"></section>
      <div id="channel-more" class="ch-more" hidden>
        <button id="channel-more-button" class="button secondary" type="button">더 보기</button>
      </div>
    </main>

    <footer class="ch-footer">
      <a href="/terms.html">이용약관</a>
      <a href="/privacy.html">개인정보처리방침</a>
    </footer>

    <div id="toast-root" class="ch-toast-root" aria-live="assertive"></div>
  </body>
</html>
